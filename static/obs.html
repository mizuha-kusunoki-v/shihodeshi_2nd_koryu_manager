<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>師匠弟子杯 OBS表示</title>
<style>
  :root {
    --text: #e6edf3;
    --muted: #8b949e;
    /* 弟子戦カラー */
    --d-bg-from: #0d1117;
    --d-bg-to: #1a2332;
    --d-team1: #38bdf8;
    --d-team2: #bc8cff;
    --d-label: #38bdf8;
    /* 師匠戦カラー */
    --m-bg-from: #1a0a00;
    --m-bg-to: #0d1117;
    --m-team1: #f97316;
    --m-team2: #fbbf24;
    --m-label: #f97316;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    width: 1280px;
    height: 720px;
    overflow: hidden;
  }

  /* ===== 共通レイアウト ===== */
  #view {
    width: 1280px;
    height: 720px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 32px;
    padding: 48px;
    transition: background 0.4s ease;
  }

  /* ===== ヘッダー ===== */
  .obs-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .mode-label {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 5px 18px;
    border-radius: 4px;
    border: 1px solid currentColor;
  }
  .match-no {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 0.06em;
  }
  .match-no .unit { font-size: 14px; font-weight: 400; color: var(--muted); }

  /* ===== チームカード ===== */
  .battle {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 24px;
    align-items: center;
    width: 100%;
  }
  .team-card {
    border-radius: 14px;
    padding: 28px 32px;
    background: rgba(255, 255, 255, 0.04);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .team-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
  }
  .players {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .player-name {
    font-size: 34px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  .vs {
    font-size: 40px;
    font-weight: 900;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
  }
  .no-match {
    font-size: 16px;
    color: var(--muted);
    padding: 12px 0;
  }

  /* ===== 弟子戦モード ===== */
  #view.disciple {
    background: linear-gradient(135deg, var(--d-bg-from) 0%, var(--d-bg-to) 100%);
  }
  #view.disciple .mode-label { color: var(--d-label); }
  #view.disciple .match-no { color: var(--d-team1); }
  #view.disciple .team-card.team1 { border-top: 3px solid var(--d-team1); }
  #view.disciple .team-card.team2 { border-top: 3px solid var(--d-team2); }
  #view.disciple .team-card.team1 .team-label { color: var(--d-team1); }
  #view.disciple .team-card.team2 .team-label { color: var(--d-team2); }

  /* ===== 師匠戦モード ===== */
  #view.master {
    background: linear-gradient(135deg, var(--m-bg-from) 0%, #2d1500 50%, var(--m-bg-to) 100%);
  }
  #view.master::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(249,115,22,0.1) 0%, transparent 65%);
    pointer-events: none;
  }
  #view.master .mode-label { color: var(--m-label); }
  #view.master .match-no { color: var(--m-team1); }
  #view.master .team-card.team1 { border-top: 3px solid var(--m-team1); }
  #view.master .team-card.team2 { border-top: 3px solid var(--m-team2); }
  #view.master .team-card.team1 .team-label { color: var(--m-team1); }
  #view.master .team-card.team2 .team-label { color: var(--m-team2); }
  #view.master .team-card {
    background: rgba(249, 115, 22, 0.06);
    border-color: rgba(249, 115, 22, 0.2);
  }
</style>
</head>
<body>

<div id="view" class="disciple">
  <div class="obs-header">
    <div class="mode-label" id="mode-label">弟子戦</div>
    <div class="match-no">
      <span class="unit">第</span><span id="match-no">--</span><span class="unit">試合</span>
    </div>
  </div>

  <div class="battle">
    <div class="team-card team1">
      <div class="team-label">TEAM 1</div>
      <div class="players" id="team1"></div>
    </div>
    <div class="vs">VS</div>
    <div class="team-card team2">
      <div class="team-label">TEAM 2</div>
      <div class="players" id="team2"></div>
    </div>
  </div>
</div>

<script>
async function poll() {
  try {
    const state = await fetch('/api/state').then(r => r.json());
    render(state);
  } catch(e) {
    console.error('poll error', e);
  }
}

function render(state) {
  const view = document.getElementById('view');
  const isMaster = state.mode === 'master';

  // モード切替
  view.className = isMaster ? 'master' : 'disciple';
  document.getElementById('mode-label').textContent = isMaster ? '師匠戦' : '弟子戦';

  // 試合番号（抽選時にmatch_noが確定済み）
  const match = state.current_match;
  const matchNo = match ? match.match_no : state.match_count;
  document.getElementById('match-no').textContent = matchNo;

  // チーム表示
  const t1 = document.getElementById('team1');
  const t2 = document.getElementById('team2');

  if (match) {
    t1.innerHTML = match.team1.map(n => `<div class="player-name">${n}</div>`).join('');
    t2.innerHTML = match.team2.map(n => `<div class="player-name">${n}</div>`).join('');
  } else {
    t1.innerHTML = '<div class="no-match">待機中...</div>';
    t2.innerHTML = '';
  }
}

poll();
setInterval(poll, 1500);
</script>
</body>
</html>
